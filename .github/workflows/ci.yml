name: "Continuous Integration"

run-name: "Continuous Integration • ${{ github.ref_name }} @${{ github.actor }}"

concurrency:
    group: "ci-${{ github.workflow }}-${{ github.ref }}"
    cancel-in-progress: true

on:
    push:
        branches:
            - "main"
    pull_request:
    merge_group:
        types:
            - "checks_requested"

jobs:
    test:
        name: "Test (${{ matrix.label }})"
        runs-on: "${{ matrix.os }}"
        timeout-minutes: 60
        permissions:
            contents: "read"
            id-token: "write"
        strategy:
            fail-fast: true
            matrix:
                include:
                    - label: "linux"
                      os: "ubuntu-latest"
                      codecov_flag: "os-linux"
                    - label: "windows"
                      os: "windows-latest"
                      codecov_flag: "os-windows"
                    - label: "macos"
                      os: "macos-latest"
                      codecov_flag: "os-macos"
        defaults:
            run:
                shell: "bash"
        env:
            CODECOV_TOKEN: "${{ secrets.CODECOV_TOKEN }}"

        steps:
            - name: "Harden the runner (Audit all outbound calls)"
              if: "${{ matrix.os == 'ubuntu-latest' }}"
              uses: "step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920" # v2.20.0
              with:
                  egress-policy: "audit"

            - name: "Checkout repository"
              uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0

            - name: "Setup Node.js"
              uses: "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e" # v6.4.0
              with:
                  node-version-file: ".node-version"
                  cache: "npm"
                  cache-dependency-path: "package-lock.json"

            - name: "Install dependencies"
              run: "npm ci --force"

            - name: "Build package"
              run: "npm run build"

            - name: "Upload bundle analysis to Codecov"
              if: "${{ matrix.os == 'ubuntu-latest' && !cancelled() && env.CODECOV_TOKEN != '' }}"
              continue-on-error: true
              run: >-
                  npx @codecov/bundle-analyzer ./dist --bundle-name=${{ github.repository }} --upload-token="${CODECOV_TOKEN}"
              env:
                  GITHUB_SHA: "${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}"
                  GITHUB_REF: "${{ github.event_name == 'pull_request' && format('refs/heads/{0}', github.head_ref) || github.ref }}"

            - name: "Typecheck"
              run: "npm run typecheck"

            - name: "Run tests with coverage and JUnit report"
              run: "npx vitest run --coverage --reporter=github-actions --reporter=dot --reporter=junit --outputFile=test-report.junit.xml --silent"
              env:
                  CI: "true"
                  MAX_THREADS: "1"
                  TYPEFEST_VITEST_HANGING_PROCESS_REPORTER: "true"
                  VITEST_HANGING_PROCESS_REPORTER: "true"

            - name: "Verify coverage artifact"
              run: >-
                  python -c "from pathlib import Path; assert Path('coverage/lcov.info').is_file(), 'coverage/lcov.info was not generated'"

            - name: "Verify JUnit artifact"
              run: >-
                  python -c "from pathlib import Path; assert Path('test-report.junit.xml').is_file(), 'test-report.junit.xml was not generated'"

            - name: "Upload test results to Codecov"
              if: "${{ !cancelled() }}"
              uses: "codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f" # v7.0.0
              with:
                  use_oidc: true
                  slug: "${{ github.repository }}"
                  files: "test-report.junit.xml"
                  flags: "${{ matrix.codecov_flag }}"
                  name: "vitest-junit-${{ matrix.codecov_flag }}"
                  report_type: "test_results"
                  fail_ci_if_error: true
                  disable_search: true
                  verbose: true

            - name: "Upload coverage to Codecov"
              if: "${{ !cancelled() }}"
              uses: "codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f" # v7.0.0
              with:
                  use_oidc: true
                  slug: "${{ github.repository }}"
                  files: "./coverage/lcov.info"
                  flags: "${{ matrix.codecov_flag }}"
                  name: "vitest-unit-coverage-${{ matrix.codecov_flag }}"
                  report_type: "coverage"
                  fail_ci_if_error: true
                  disable_search: true
                  verbose: true

    verify:
        name: "Verify pipeline"
        runs-on: "ubuntu-latest"
        timeout-minutes: 60
        permissions:
            contents: "read"
        defaults:
            run:
                shell: "bash"

        steps:
            - name: "Harden the runner (Audit all outbound calls)"
              uses: "step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920" # v2.20.0
              with:
                  egress-policy: "audit"

            - name: "Checkout repository"
              uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0

            - name: "Setup Node.js"
              uses: "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e" # v6.4.0
              with:
                  cache: "npm"
                  cache-dependency-path: "package-lock.json"
                  node-version-file: ".node-version"

            - name: "Install dependencies"
              run: "npm ci --force"

            - name: "Run full verification pipeline"
              run: "npm run release:verify"
